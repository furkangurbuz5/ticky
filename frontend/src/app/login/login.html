<form
  #loginForm="ngForm"
  (ngSubmit)="onLogin(loginForm)"
  class="max-w-md mx-auto p-6 bg-white rounded-lg shadow-md"
>
  <!-- Username Field -->
  <div class="mb-4">
    <label class="block text-gray-700 text-sm font-bold mb-2" for="username"> Username </label>
    <input
      ngModel
      name="username"
      id="username"
      type="text"
      required
      email
      #username="ngModel"
      class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
      placeholder="Username"
    />
  </div>

  <!-- Password Field -->
  <div class="mb-6">
    <label class="block text-gray-700 text-sm font-bold mb-2" for="password"> Password </label>
    <input
      ngModel
      name="password"
      id="password"
      type="password"
      required
      minlength="6"
      #password="ngModel"
      class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
      placeholder="Password"
    />
  </div>

  <!-- Submit Button -->
  <div class="flex items-center justify-between">
    <button
      type="submit"
      class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
    >
      Sign In
    </button>
  </div>

  @if (username.dirty && username.touched && password.touched && loginForm.invalid) {
    <p class="text-red-400">Invalid username or password entered.</p>
  }
</form>
